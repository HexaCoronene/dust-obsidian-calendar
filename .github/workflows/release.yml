name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build plugin
      run: npm run build
    
    - name: Create release package
      run: |
        cd dist
        zip -r ../obsidian-dust-calendar-${{ github.ref_name }}.zip .
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          obsidian-dust-calendar-${{ github.ref_name }}.zip
        prerelease: false
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}